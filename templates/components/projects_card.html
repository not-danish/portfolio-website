<div class="glass-card p-5 h-full" style="display: flex; flex-direction: column;">
    <span class="topic-badge">{{ project.topic }}</span>
    <h1 class="display" style="font-size: 1.05rem; font-weight: 700; color: #FDFFFC; margin-bottom: 8px;">{{ project.title }}</h1>
    <p style="font-size: 0.875rem; color: rgba(227,216,241,0.75); line-height: 1.6; flex-grow: 1; margin-bottom: 18px;">{{ project.subtitle | safe }}</p>
    <div>
        <a href="{{ project.link }}" class="btn-primary" style="font-size: 0.85rem; padding: 8px 18px;">
            Learn More
            <svg style="width: 14px; height: 14px;" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14"></path>
                <path d="M12 5l7 7-7 7"></path>
            </svg>
        </a>
    </div>
</div>
